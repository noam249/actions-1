name: Generate ASCII
on: push

jobs:
    build_job_1:
      runs-on: ubuntu-latest
      steps:
        - name: Install Cowsay
          run: sudo apt install cowsay -y

        - name: Execute Cowsay
          run: cowsay "Mooo" >> cow.txt

        - name: Upload Cow file
          uses: actions/upload-artifact@v7
          with:
            name: cow-file
            path: cow.txt
    
    test_job_2:
      needs: build_job_1
      runs-on: ubuntu-latest
      steps:
        - name: Upload Cow file
          uses: actions/download-artifact@v7
          with:
            name: cow-file

        - name: Test File Exists
          run: grep -i "mooo" cow.txt

    deploy_job_3:
      needs: test_job_2
      runs-on: ubuntu-latest
      steps:
        - name: Upload Cow file
          uses: actions/download-artifact@v7
          with:
            name: cow-file

        - name: Read File
          run: cat cow.txt

        - name: Deploy
          run: echo Deploying ... .. .






