name: Exploring Variables and Secrets
on: push

env:
  REGISTRY: docker.io
  USERNAME: fakename
  IMAGE_NAME: myimage

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
    - name: Docker Build
      run: echo docker build -t ${{ env.REGISTRY }}/${{ env.USERNAME }}/${{ env.IMAGE_NAME }}:latest

    - name: Docker login
      env:
        PASSWORD: thisismyrealpassword
      run: echo docker login --username=${{ env.USERNAME }} --password=${{ env.PASSWORD }}

    - name: Docker publish
      run: echo docker push ${{ env.REGISTRY }}/${{ env.USERNAME }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    needs: docker
    runs-on: ubuntu-latest
    steps:
    - name: Docker run
      run: echo docker run -d -p 8080:80 ${{ env.REGISTRY }}/${{ env.USERNAME }}/${{ env.IMAGE_NAME }}:latest
      

